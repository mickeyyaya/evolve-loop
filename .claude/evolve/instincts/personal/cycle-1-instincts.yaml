- id: inst-001
  pattern: "wt-cli-not-real"
  description: "The `wt` CLI tool referenced in agent files does not exist. Always use Claude Code's built-in EnterWorktree/ExitWorktree tools for worktree management."
  confidence: 0.7
  source: "cycle-1/fix-wt-worktree-references"
  type: "anti-pattern"

- id: inst-002
  pattern: "ecc-overlay-not-copy"
  description: "ECC wrapper agents must be thin context overlays using subagent_type delegation, NOT full copies of ECC agent content. Copying leads to stale, bloated files."
  confidence: 0.8
  source: "cycle-1/fix-docs-and-ledger-consistency"
  type: "architecture"

- id: inst-003
  pattern: "ledger-ts-not-timestamp"
  description: "The canonical ledger field for time is 'ts', not 'timestamp'. All agents and the orchestrator must use 'ts' per memory-protocol.md."
  confidence: 0.9
  source: "cycle-1/fix-docs-and-ledger-consistency"
  type: "convention"

- id: inst-004
  pattern: "grep-based-evals-effective"
  description: "For Markdown/Shell projects without test infrastructure, grep-based eval checks are effective for verifying acceptance criteria. Define specific grep commands with expected match counts."
  confidence: 0.6
  source: "cycle-1/eval-runner"
  type: "successful-pattern"
