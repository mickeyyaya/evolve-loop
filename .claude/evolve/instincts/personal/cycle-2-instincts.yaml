- id: inst-005
  pattern: "major-version-stale-refs"
  description: "After a major version overhaul (e.g. v3→v4), internal docs that reference old phase numbers, agent names, or architecture will be wrong. The eval-runner.md still said 'Phase 5.5' and 'Developer agent' after v4 shipped. Always scan ALL skill/doc files for stale terminology after an architecture change."
  confidence: 0.8
  source: "cycle-2/fix-eval-runner-stale-refs"
  type: "anti-pattern"

- id: inst-006
  pattern: "ci-mode-for-scripts"
  description: "Shell scripts that serve as the project's test command should support CI=true or --ci flag to suppress decorative output and emit machine-readable results. This enables CI workflows and automated validation."
  confidence: 0.7
  source: "cycle-2/add-install-ci-mode"
  type: "successful-pattern"

- id: inst-007
  pattern: "orchestrator-as-builder"
  description: "For small well-defined tasks (S complexity, <10 lines changed), the orchestrator can implement directly instead of launching a Builder agent. This saves ~30-50K tokens per task. Only do this when the task is fully specified with clear acceptance criteria and eval definitions."
  confidence: 0.6
  source: "cycle-2/all-tasks"
  type: "process"

- id: inst-004-update
  pattern: "grep-based-evals-effective"
  description: "For Markdown/Shell projects without test infrastructure, grep-based eval checks are effective for verifying acceptance criteria. Define specific grep commands with expected match counts. Confirmed effective across 2 cycles (9 checks cycle 1, 11 checks cycle 2, all passing)."
  confidence: 0.8
  source: "cycle-1+2"
  type: "successful-pattern"
