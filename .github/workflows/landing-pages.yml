name: landing-pages

# Builds the static landing site (landing/dist) with the Go SSG and publishes it
# to GitHub Pages. Scoped to landing/ so it never runs for product changes.
on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/landing-pages.yml'
      - 'install.sh'
      - 'docs/explain/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: landing-pages
  cancel-in-progress: false

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Render content + templates → dist
        working-directory: landing
        run: go run ./cmd/build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing/dist

  deploy:
    name: deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
