name: go

on:
  push:
    branches: [main, go-rewrite-phase-1]
    paths:
      - 'go/**'
      - 'skills/**'  # TestSkills_NoDrift (go/cmd/evolve) asserts SKILL.md is in sync with the profiles/registry SSOTs; a skills/ change can break it.
      - 'agents/**'  # TestPersonaStopCriterionDedupe (go/internal/prompts) pins a combined size budget on agents/evolve-*.md; a persona-doc change can break it invisibly otherwise (2026-07-23: happened twice in one day).
      - '.github/workflows/go.yml'
  pull_request:
    paths:
      - 'go/**'
      - 'skills/**'  # TestSkills_NoDrift (go/cmd/evolve) asserts SKILL.md is in sync with the profiles/registry SSOTs; a skills/ change can break it.
      - 'agents/**'  # TestPersonaStopCriterionDedupe (go/internal/prompts) pins a combined size budget on agents/evolve-*.md; a persona-doc change can break it invisibly otherwise (2026-07-23: happened twice in one day).
      - '.github/workflows/go.yml'

permissions:
  contents: read

jobs:
  build-test:
    name: build + test (Go)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.23']
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: go/go.sum
      - run: go mod download
      - name: vet + fmt
        run: |
          go vet ./...
          diff_out=$(gofmt -d -s .)
          if [ -n "$diff_out" ]; then
            echo "$diff_out"
            echo "FAIL: gofmt diff" >&2
            exit 1
          fi
      - name: build
        run: make build
      - name: test (race + cover, incl. integration tier)
        # Boot timeout is configured via BridgePolicy.BootTimeoutS in
        # .evolve/policy.json (bridge.boot_timeout_s) — no env override needed.
        run: |
          # Exclude acs/ — per-cycle ACS predicate evals that read runtime
          # artifacts (.evolve/runs/cycle-N/...) absent in CI; they run in the
          # live cycle context, not the unit gate (matches the Makefile).
          # -tags integration pulls in the real-FS/git/tmux tier so internal/*
          # coverage reflects it. The e2e tier (subprocess-heavy, no -race) runs
          # in the separate step below. See go/docs/testing.md (cost × granularity).
          go test -race -count=1 -tags integration -coverprofile=coverage.txt $(go list ./... | grep -v '/acs/')
          go tool cover -func=coverage.txt
      - name: e2e tier (no race; live sub-tier self-skips without live flag)
        # `evolve_test_phases` is added alongside `e2e` so the serve-phase
        # subprocess round-trip test (cmd/evolve/e2e_serve_phase_subprocess_test.go
        # + echo_phase_testbuild.go) compiles and runs — it was previously
        # orphaned (no workflow passed its tag). It registers a test-only "echo"
        # phase into the phases registry; production builds never set the tag.
        run: go test -count=1 -tags "e2e evolve_test_phases" ./cmd/... ./test/e2e/...
      - name: coverage gate (>=85% per internal/* package)
        run: |
          fail=0
          while IFS=$'\t' read -r pkg pct; do
            case "$pkg" in
              *internal/*|*/pkg/acsassert*|*/pkg/version*)
                num=${pct%.*}
                if [ "$num" -lt 85 ]; then
                  echo "::warning::coverage gate: $pkg at $pct (<85%)"
                  fail=1
                fi
                ;;
            esac
          done < <(go tool cover -func=coverage.txt | awk '/total:/ {next} {print $1"\t"$3}' | sed 's/%//')
          # Phase 1 build: warning-only until task #17 lands all packages.
          # Gate flips to hard fail once orchestrator phases (Phase 2) settle.
          exit 0
      - name: api-coverage report (apicover; warning-only, Phase 0)
        # cmd/apicover: every exported symbol must be named by a _test AST AND
        # show >0% executed coverage; named-but-0% are false-greens a bare line
        # number hides. Warning-only here (mirrors the >=85% gate above) for
        # not-yet-graduated packages; the per-package -enforce gate (Phase 5)
        # runs in the next step over go/.apicover-enforce. Reuses coverage.txt
        # from the test step, so no second test run.
        run: |
          go build -o bin/apicover ./cmd/apicover
          go tool cover -func=coverage.txt > coverage.func.txt
          bin/apicover -cover coverage.func.txt $(go list -f '{{.Dir}}' ./internal/...) > apicover-report.txt || true
          grep -E '^(== |summary:)' apicover-report.txt | tail -80 || true
          echo "::notice::apicover is warning-only in Phase 0 (full report in the coverage artifact)"
          exit 0
      - name: api-coverage enforce (apicover; per-package hard-fail, Phase 5)
        # Packages in go/.apicover-enforce have reached the Phase 5 public-API
        # DoD; a regression (a new unnamed or never-asserted export) fails the
        # build. Self-contained: rebuilds apicover + coverage.func.txt from the
        # test step's coverage.txt (the warning step above is best-effort and
        # must not gate this). The warning sweep still reports everything else.
        run: |
          pkgs=$(grep -vE '^[[:space:]]*(#|$)' .apicover-enforce || true)
          if [ -z "$pkgs" ]; then echo "no enforced packages — skipping"; exit 0; fi
          go build -o bin/apicover ./cmd/apicover
          go tool cover -func=coverage.txt > coverage.func.txt
          # -e: tolerate build-tag-gated packages (e.g. acs/cycleN need -tags acs).
          # Without it, `go list` exits non-zero on those and `set -e` aborts the
          # step before apicover even runs. Their dirs still resolve; apicover
          # finds 0 exported symbols in the test-only acs packages and passes.
          dirs=$(echo "$pkgs" | xargs go list -e -f '{{.Dir}}')
          echo "enforcing apicover (-enforce) on:"; echo "$dirs"
          echo "$dirs" | xargs bin/apicover -enforce -cover coverage.func.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.os }}
          path: |
            go/coverage.txt
            go/apicover-report.txt
