name: go

on:
  push:
    branches: [main, go-rewrite-phase-1]
    paths:
      - 'go/**'
      - 'commit-gate/**'
      - 'skills/**'  # TestSkills_NoDrift (go/cmd/evolve) asserts SKILL.md is in sync with the profiles/registry SSOTs; a skills/ change can break it.
      - 'go/test/commitgate/commit-gate-test.sh'
      - '.github/workflows/go.yml'
  pull_request:
    paths:
      - 'go/**'
      - 'commit-gate/**'
      - 'skills/**'  # TestSkills_NoDrift (go/cmd/evolve) asserts SKILL.md is in sync with the profiles/registry SSOTs; a skills/ change can break it.
      - 'go/test/commitgate/commit-gate-test.sh'
      - '.github/workflows/go.yml'

permissions:
  contents: read

jobs:
  build-test:
    name: build + test (Go)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.23']
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: go/go.sum
      - run: go mod download
      - name: vet + fmt
        run: |
          go vet ./...
          diff_out=$(gofmt -d -s .)
          if [ -n "$diff_out" ]; then
            echo "$diff_out"
            echo "FAIL: gofmt diff" >&2
            exit 1
          fi
      - name: build
        run: make build
      - name: test (race + cover, incl. integration tier)
        # Raise the REPL boot-wait budget (default 60s) for the integration
        # tier: a loaded CI runner intermittently exceeds it on the fake-CLI/
        # tmux handshake ("REPL prompt never appeared after 60s"), flaking
        # internal/bridge. Reaches the tests via os.LookupEnv (Deps.withDefaults).
        env:
          EVOLVE_BOOT_TIMEOUT_S: "120"
        run: |
          # Exclude acs/ — per-cycle ACS predicate evals that read runtime
          # artifacts (.evolve/runs/cycle-N/...) absent in CI; they run in the
          # live cycle context, not the unit gate (matches the Makefile).
          # -tags integration pulls in the real-FS/git/tmux tier so internal/*
          # coverage reflects it. The e2e tier (subprocess-heavy, no -race) runs
          # in the separate step below. See go/docs/testing.md (cost × granularity).
          go test -race -count=1 -tags integration -coverprofile=coverage.txt $(go list ./... | grep -v '/acs/')
          go tool cover -func=coverage.txt
      - name: e2e tier (no race; live sub-tier self-skips without EVOLVE_E2E_LIVE)
        run: go test -count=1 -tags e2e ./cmd/... ./test/e2e/...
      - name: commit-gate gate tests (bash)
        # Runs here (not ci.yml) because the harness fixtures use `go 1.23`,
        # which needs the toolchain set up above. golangci-lint is optional in
        # the runner, so its absence in CI is fine.
        working-directory: ${{ github.workspace }}
        run: bash go/test/commitgate/commit-gate-test.sh
      - name: coverage gate (>=85% per internal/* package)
        run: |
          fail=0
          while IFS=$'\t' read -r pkg pct; do
            case "$pkg" in
              *internal/*|*/pkg/acsassert*|*/pkg/version*)
                num=${pct%.*}
                if [ "$num" -lt 85 ]; then
                  echo "::warning::coverage gate: $pkg at $pct (<85%)"
                  fail=1
                fi
                ;;
            esac
          done < <(go tool cover -func=coverage.txt | awk '/total:/ {next} {print $1"\t"$3}' | sed 's/%//')
          # Phase 1 build: warning-only until task #17 lands all packages.
          # Gate flips to hard fail once orchestrator phases (Phase 2) settle.
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.os }}
          path: |
            go/coverage.txt
