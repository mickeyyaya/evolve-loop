name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run install
        run: CI=true ./install.sh

      - name: Verify agent files exist
        run: |
          for agent in evolve-scout evolve-builder evolve-auditor evolve-operator; do
            if [ ! -f "agents/${agent}.md" ]; then
              echo "FAIL: agents/${agent}.md not found"
              exit 1
            fi
            echo "OK: agents/${agent}.md"
          done

      - name: Verify skill files exist
        run: |
          for skill in SKILL.md phases.md memory-protocol.md eval-runner.md; do
            if [ ! -f "skills/evolve-loop/${skill}" ]; then
              echo "FAIL: skills/evolve-loop/${skill} not found"
              exit 1
            fi
            echo "OK: skills/evolve-loop/${skill}"
          done

      - name: Verify agent frontmatter
        run: |
          for agent in agents/evolve-*.md; do
            if ! head -1 "$agent" | grep -q "^---$"; then
              echo "FAIL: $agent missing YAML frontmatter"
              exit 1
            fi
            echo "OK: $agent has frontmatter"
          done

      - name: Verify plugin manifest
        run: |
          if [ ! -f ".claude-plugin/plugin.json" ]; then
            echo "FAIL: .claude-plugin/plugin.json not found"
            exit 1
          fi
          echo "OK: plugin.json exists"
          python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))" 2>/dev/null && echo "OK: plugin.json is valid JSON" || echo "WARN: could not validate JSON (python3 not available)"
