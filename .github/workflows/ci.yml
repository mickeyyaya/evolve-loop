name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin structure
        run: CI=true ./install.sh

      - name: Verify plugin manifest
        run: |
          python3 -c "
          import json, sys
          with open('.claude-plugin/plugin.json') as f:
              p = json.load(f)
          required = ['name', 'version', 'description', 'agents', 'skills']
          missing = [k for k in required if k not in p]
          if missing:
              print(f'FAIL: plugin.json missing fields: {missing}')
              sys.exit(1)
          if not isinstance(p['agents'], list):
              print('FAIL: agents must be an array')
              sys.exit(1)
          if not isinstance(p['skills'], list):
              print('FAIL: skills must be an array')
              sys.exit(1)
          print(f'OK: plugin.json has {len(p[\"agents\"])} agents, {len(p[\"skills\"])} skill paths')
          "

      - name: Verify marketplace manifest
        run: |
          python3 -c "
          import json, sys
          with open('.claude-plugin/marketplace.json') as f:
              m = json.load(f)
          if 'plugins' not in m or len(m['plugins']) == 0:
              print('FAIL: marketplace.json has no plugins')
              sys.exit(1)
          print(f'OK: marketplace.json has {len(m[\"plugins\"])} plugin(s)')
          "

      - name: Verify agent frontmatter has required fields
        run: |
          for agent in agents/evolve-*.md; do
            if ! head -1 "$agent" | grep -q "^---$"; then
              echo "FAIL: $agent missing YAML frontmatter"
              exit 1
            fi
            # Check for name and description in frontmatter
            frontmatter=$(sed -n '2,/^---$/p' "$agent" | head -n -1)
            if ! echo "$frontmatter" | grep -q "^name:"; then
              echo "FAIL: $agent frontmatter missing 'name' field"
              exit 1
            fi
            if ! echo "$frontmatter" | grep -q "^description:"; then
              echo "FAIL: $agent frontmatter missing 'description' field"
              exit 1
            fi
            echo "OK: $agent"
          done

      - name: Verify required skill files exist
        run: |
          ERRORS=0
          for skill in skills/evolve-loop/SKILL.md skills/evolve-loop/phases.md skills/evolve-loop/memory-protocol.md skills/evolve-loop/eval-runner.md; do
            if [ ! -f "$skill" ]; then
              echo "FAIL: $skill not found"
              ERRORS=$((ERRORS + 1))
            else
              echo "OK: $skill"
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            exit 1
          fi

      - name: Verify v6 required docs exist
        run: |
          ERRORS=0
          for doc in docs/genes.md docs/island-model.md docs/instincts.md docs/configuration.md; do
            if [ ! -f "$doc" ]; then
              echo "FAIL: $doc not found"
              ERRORS=$((ERRORS + 1))
            else
              echo "OK: $doc"
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            exit 1
          fi
