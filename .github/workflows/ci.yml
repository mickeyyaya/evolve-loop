name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Wave E of the bash→Go migration: the entire plugin-structure validation
      # — formerly six steps (install.sh + two python3 JSON validators + three
      # inline-bash file-existence loops) — now lives in installer.Validate and
      # runs as one script-free `evolve install --ci`. See go/internal/installer.
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: go/go.sum

      - name: Build evolve
        run: cd go && go build -o bin/evolve ./cmd/evolve

      - name: Validate plugin structure
        run: go/bin/evolve install --ci

      # No-orphan invariant: the bash→Go migration removed every .sh/.py; this
      # fails the build if any reappears. Also enforced per-cycle by the EGPS
      # acs gate (go/acs/regression/noorphan) — this runs it on every push/PR.
      - name: No orphaned scripts (zero .sh/.py)
        run: cd go && go test -tags acs ./acs/regression/noorphan/...
